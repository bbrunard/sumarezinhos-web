<div class="page">
  <div class="page-header">
    <span class="page-tag">🐾 Adote com amor</span>
    <h1>Animaizinhos esperando por você</h1>
    <p>Filtre por tipo, porte ou sexo e encontre o seu match perfeito!</p>
  </div>

  <!-- Filtros -->
  <div class="filters-row">
    <button *ngFor="let f of filtros; let i = index"
      class="filter-btn" [class.active]="filtroAtivo === i"
      (click)="setEspecie(i, f.especie)">{{ f.label }}</button>

    <select [(ngModel)]="filtroPorte" (change)="buscar()" class="filter-select">
      <option *ngFor="let p of portes" [ngValue]="p.value">{{ p.label }}</option>
    </select>

    <select [(ngModel)]="filtroSexo" (change)="buscar()" class="filter-select">
      <option [ngValue]="undefined">Qualquer sexo</option>
      <option value="M">🐾 Macho</option>
      <option value="F">🌸 Fêmea</option>
    </select>
  </div>

  <!-- Carregando -->
  <div class="state-box" *ngIf="loading">
    <div class="state-spinner">🐾</div>
    <p>Buscando animaizinhos...</p>
  </div>

  <!-- Erro -->
  <div class="state-box error" *ngIf="!loading && erro">
    <div class="state-icon">😿</div>
    <p>{{ erro }}</p>
    <button class="btn-retry" (click)="buscar()">Tentar novamente</button>
  </div>

  <!-- Vazio -->
  <div class="state-box" *ngIf="!loading && !erro && animais.length === 0">
    <div class="state-icon">🔍</div>
    <p>Nenhum animal encontrado com esses filtros.<br>Tente remover alguns filtros!</p>
    <button class="btn-retry" (click)="filtroAtivo=0; filtroEspecie=undefined; filtroPorte=undefined; filtroSexo=undefined; buscar()">
      Limpar filtros
    </button>
  </div>

  <!-- Grid -->
  <div class="cards-grid" *ngIf="!loading && !erro && animais.length > 0">
    <app-animal-card *ngFor="let a of animais" [animal]="a" />
  </div>
</div>
